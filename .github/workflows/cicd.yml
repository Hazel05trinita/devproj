name: CI-CD Pipeline

on:
  push:
    branches: [dev, main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker-build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION_TAG="v0.1.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION_TAG=${VERSION_TAG}" >> $GITHUB_ENV

      - name: Build backend image
        run: |
          docker build \
            -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest \
            -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.VERSION_TAG }} \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest \
            -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.VERSION_TAG }} \
            ./frontend

      - name: Push backend image
        run: |
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.VERSION_TAG }}

      - name: Push frontend image
        run: |
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.VERSION_TAG }}

  deploy-dev:
    name: Deploy to AKS Dev
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check kubeconfig secret (dev)
        id: gate
        env:
          KUBE_CONFIG_DEV: ${{ secrets.KUBE_CONFIG_DEV }}
        run: |
          if [ -z "$KUBE_CONFIG_DEV" ]; then
            echo "KUBE_CONFIG_DEV is empty. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Kubernetes context (dev)
        if: steps.gate.outputs.skip != 'true'
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: Inject Docker Hub image names into manifests
        if: steps.gate.outputs.skip != 'true'
        run: |
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER/backend|docker.io/${{ secrets.DOCKERHUB_USERNAME }}/backend|g" k8s/dev/backend-deployment.yaml
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER/frontend|docker.io/${{ secrets.DOCKERHUB_USERNAME }}/frontend|g" k8s/dev/frontend-deployment.yaml

      - name: Deploy manifests to dev
        if: steps.gate.outputs.skip != 'true'
        run: |
          kubectl apply -f k8s/dev/namespace.yaml
          kubectl apply -f k8s/dev/
          kubectl rollout status deployment/backend-deployment -n dev --timeout=120s
          kubectl rollout status deployment/frontend-deployment -n dev --timeout=120s

      - name: Rollback on failure (dev)
        if: failure() && steps.gate.outputs.skip != 'true'
        run: |
          kubectl rollout undo deployment/backend-deployment -n dev || true
          kubectl rollout undo deployment/frontend-deployment -n dev || true

  deploy-prod:
    name: Deploy to AKS Prod
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: prod
      url: https://prod.example.local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check kubeconfig secret (prod)
        id: gate
        env:
          KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}
        run: |
          if [ -z "$KUBE_CONFIG_PROD" ]; then
            echo "KUBE_CONFIG_PROD is empty. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Kubernetes context (prod)
        if: steps.gate.outputs.skip != 'true'
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Inject Docker Hub image names into manifests
        if: steps.gate.outputs.skip != 'true'
        run: |
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER/backend|docker.io/${{ secrets.DOCKERHUB_USERNAME }}/backend|g" k8s/prod/backend-deployment.yaml
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER/frontend|docker.io/${{ secrets.DOCKERHUB_USERNAME }}/frontend|g" k8s/prod/frontend-deployment.yaml

      - name: Deploy manifests to prod
        if: steps.gate.outputs.skip != 'true'
        run: |
          kubectl apply -f k8s/prod/namespace.yaml
          kubectl apply -f k8s/prod/
          kubectl rollout status deployment/backend-deployment -n prod --timeout=180s
          kubectl rollout status deployment/frontend-deployment -n prod --timeout=180s

      - name: Rollback on failure (prod)
        if: failure() && steps.gate.outputs.skip != 'true'
        run: |
          kubectl rollout undo deployment/backend-deployment -n prod || true
          kubectl rollout undo deployment/frontend-deployment -n prod || true
