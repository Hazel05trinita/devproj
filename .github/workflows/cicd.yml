name: CI-CD Pipeline

on:
  push:
    branches: [dev, main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker-build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tags
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION_TAG="v0.1.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION_TAG=${VERSION_TAG}" >> $GITHUB_ENV

      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.VERSION_TAG }} \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.VERSION_TAG }} \
            ./frontend

      - name: Push backend image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.VERSION_TAG }}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.VERSION_TAG }}

  deploy-dev:
    name: Deploy to AKS Dev
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group ${{ secrets.AZURE_RG_DEV }} --name ${{ secrets.AKS_CLUSTER_NAME_DEV }} --overwrite-existing

      - name: Inject ACR login server into manifests
        run: |
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER|${{ secrets.ACR_LOGIN_SERVER }}|g" k8s/dev/backend-deployment.yaml
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER|${{ secrets.ACR_LOGIN_SERVER }}|g" k8s/dev/frontend-deployment.yaml

      - name: Deploy manifests to dev
        run: |
          kubectl apply -f k8s/dev/namespace.yaml
          kubectl apply -f k8s/dev/
          kubectl rollout status deployment/backend-deployment -n dev --timeout=120s
          kubectl rollout status deployment/frontend-deployment -n dev --timeout=120s

      - name: Rollback on failure (dev)
        if: failure()
        run: |
          kubectl rollout undo deployment/backend-deployment -n dev || true
          kubectl rollout undo deployment/frontend-deployment -n dev || true

  deploy-prod:
    name: Deploy to AKS Prod
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: prod
      url: https://prod.example.local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group ${{ secrets.AZURE_RG_PROD }} --name ${{ secrets.AKS_CLUSTER_NAME_PROD }} --overwrite-existing

      - name: Inject ACR login server into manifests
        run: |
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER|${{ secrets.ACR_LOGIN_SERVER }}|g" k8s/prod/backend-deployment.yaml
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER|${{ secrets.ACR_LOGIN_SERVER }}|g" k8s/prod/frontend-deployment.yaml

      - name: Deploy manifests to prod
        run: |
          kubectl apply -f k8s/prod/namespace.yaml
          kubectl apply -f k8s/prod/
          kubectl rollout status deployment/backend-deployment -n prod --timeout=180s
          kubectl rollout status deployment/frontend-deployment -n prod --timeout=180s

      - name: Rollback on failure (prod)
        if: failure()
        run: |
          kubectl rollout undo deployment/backend-deployment -n prod || true
          kubectl rollout undo deployment/frontend-deployment -n prod || true
